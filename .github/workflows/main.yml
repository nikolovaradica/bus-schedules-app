name: Bus Schedules App

on: 
  push:
    branches: [develop, main]
  pull_request:
    branches: [main]
    
jobs:
  build-push:
    name: Build, Test and Push Images
    runs-on: ubuntu-latest
    
    permissions:
      contents: read
      packages: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
      
      - name: Build backend
        working-directory: backend
        run: mvn clean package -DskipTests
      
      - name: Run backend tests
        working-directory: backend
        run: mvn test
      
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18
      
      - name: Build frontend
        working-directory: frontend
        run: |
          npm install
          npx tsc --project tsconfig.json || true
          npm run build
      
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/bus-schedules-backend:latest
            ghcr.io/${{ github.repository_owner }}/bus-schedules-backend:${{ github.sha }}
      
      - name: Build and push frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/bus-schedules-frontend:latest
            ghcr.io/${{ github.repository_owner }}/bus-schedules-frontend:${{ github.sha }}
        
  deploy-dev:
    name: Deploy to Dev
    needs: build-push
    runs-on: ubuntu-latest
    
    if: github.ref == 'refs/heads/develop'
    environment: dev
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Deploy containers
        env:
          POSTGRESQL_URL: ${{ secrets.POSTGRESQL_URL }}
          POSTGRESQL_USER: ${{ secrets.POSTGRESQL_USER }}
          POSTGRESQL_PASS: ${{ secrets.POSTGRESQL_PASS }}
          POSTGRESQL_DB: ${{ secrets.POSTGRESQL_DB }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
        run: |
          docker compose pull
          docker compose up -d
          docker compose ps

  deploy-prod:
    name: Deploy to Prod
    needs: build-push
    runs-on: ubuntu-latest
    
    if: github.ref == 'refs/heads/main'
    environment: prod
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Deploy containers
        env:
          POSTGRESQL_URL: ${{ secrets.POSTGRESQL_URL }}
          POSTGRESQL_USER: ${{ secrets.POSTGRESQL_USER }}
          POSTGRESQL_PASS: ${{ secrets.POSTGRESQL_PASS }}
          POSTGRESQL_DB: ${{ secrets.POSTGRESQL_DB }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
        run: |
          docker compose pull
          docker compose up -d
          docker compose ps
