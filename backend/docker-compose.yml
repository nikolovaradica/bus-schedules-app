services:
  postgres:
    image: postgres:14-alpine
    container_name: bus-schedules
    restart: unless-stopped
    ports:
      - 5432:5432
    environment:
      - POSTGRES_PASSWORD=buspass123
      - POSTGRES_USER=bususer123
      - POSTGRES_DB=bus-schedule-app
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: